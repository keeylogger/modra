<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Native bridges | Modra demo</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        modra: { 50: '#ecf9ef', 100: '#d3f1d8', 500: '#3FB456', 600: '#2E9D43', 700: '#155E2B' },
        ember: { 100: '#fde2e4', 500: '#E5394A', 600: '#C72436' },
      }}},
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body { background: #f6f7f9; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    .demo-eyebrow { font-feature-settings: "cv11", "ss01"; }
    .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
  </style>
</head>
<body class="min-h-screen p-6 antialiased text-slate-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    // ─── Faked bridge implementations (the real ones spawn subprocesses) ──

    // Native<Python> { transformers sentiment-analysis }
    function classifySentiment(text) {
      const t = text.toLowerCase();
      const positives = ["love", "great", "amazing", "good", "happy", "awesome", "nice", "fantastic", "excellent", "modra"];
      const negatives = ["hate", "bad", "awful", "terrible", "sad", "angry", "broken", "ugly", "slow", "fail"];
      let score = 0;
      for (const w of positives) if (t.includes(w)) score++;
      for (const w of negatives) if (t.includes(w)) score--;
      const label = score > 0 ? "POSITIVE" : score < 0 ? "NEGATIVE" : "NEUTRAL";
      const confidence = Math.min(0.99, 0.5 + Math.abs(score) * 0.13);
      return { label, confidence };
    }

    // Native<TypeScript> slugify
    function slugify(title) {
      return title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }

    // Native<Bash> uptime
    function readUptime() {
      return (Math.floor(Math.random() * 50000) + 12345).toFixed(2);
    }

    function App() {
      const [text, setText] = useState("I love Modra. The hex tiles look amazing.");
      const [title, setTitle] = useState("Hello, World! And Modra.");

      const [sentiment, setSentiment] = useState(null);
      const [slug, setSlug] = useState("");
      const [uptime, setUptime] = useState("");
      const [running, setRunning] = useState(false);

      const runAll = async (e) => {
        e?.preventDefault?.();
        setRunning(true);
        setSentiment(null); setSlug(""); setUptime("");

        // Stagger the results so it feels like 3 real subprocesses
        await delay(400);
        setSentiment(classifySentiment(text));
        await delay(250);
        setSlug(slugify(title));
        await delay(300);
        setUptime(readUptime());
        setRunning(false);
      };

      return (
        <div className="max-w-5xl mx-auto">
          <div className="demo-eyebrow flex items-center gap-2 mb-3 text-[10px] uppercase tracking-[0.18em] font-bold text-modra-700">
            <span className="inline-block w-1.5 h-1.5 rounded-full bg-modra-500 animate-pulse"></span>
            Modra runtime | Native&lt;Python&gt; + Native&lt;TypeScript&gt; + Native&lt;Bash&gt;
          </div>

          <div className="grid md:grid-cols-5 gap-4">
            {/* ── Inputs ── */}
            <form onSubmit={runAll} className="md:col-span-2 rounded-2xl bg-white border border-slate-200 shadow-sm p-5 space-y-3">
              <h2 className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Inputs</h2>

              <label className="block">
                <span className="block text-xs font-semibold text-slate-600 mb-1">Text (for sentiment)</span>
                <textarea
                  value={text}
                  onChange={(e) => setText(e.target.value)}
                  rows={3}
                  className="w-full px-3 py-2 rounded-lg border border-slate-200 bg-slate-50 focus:bg-white focus:border-modra-500 focus:ring-2 focus:ring-modra-100 outline-none text-sm resize-none"
                />
              </label>

              <label className="block">
                <span className="block text-xs font-semibold text-slate-600 mb-1">Blog title (for slug)</span>
                <input
                  value={title}
                  onChange={(e) => setTitle(e.target.value)}
                  className="w-full px-3 py-2 rounded-lg border border-slate-200 bg-slate-50 focus:bg-white focus:border-modra-500 focus:ring-2 focus:ring-modra-100 outline-none text-sm"
                />
              </label>

              <button
                type="submit"
                disabled={running}
                className="w-full px-5 py-3 rounded-xl bg-modra-500 hover:bg-modra-600 disabled:bg-slate-200 disabled:text-slate-400 text-white font-semibold text-sm transition-colors flex items-center justify-center gap-2"
              >
                {running ? (
                  <>
                    <span className="inline-block w-3 h-3 border-2 border-white border-r-transparent rounded-full animate-spin"></span>
                    Running 3 subprocesses...
                  </>
                ) : (
                  <>Run all</>
                )}
              </button>
            </form>

            {/* ── Outputs ── */}
            <div className="md:col-span-3 space-y-3">
              <BridgeCard
                lang="Python"
                accent="from-modra-50 to-modra-100/40"
                label="sentiment-analysis"
                snippet={'from transformers import pipeline\nclassifier = pipeline("sentiment-analysis")\nlabel = classifier(text)[0]["label"]'}
              >
                {sentiment ? (
                  <div>
                    <div className="flex items-baseline gap-2">
                      <span className={
                        "inline-block px-2.5 py-1 rounded-full text-xs font-bold " +
                        (sentiment.label === "POSITIVE"
                          ? "bg-modra-500 text-white"
                          : sentiment.label === "NEGATIVE"
                          ? "bg-ember-500 text-white"
                          : "bg-slate-200 text-slate-700")
                      }>{sentiment.label}</span>
                      <span className="text-sm text-slate-600 tabular-nums">
                        confidence {(sentiment.confidence * 100).toFixed(1)}%
                      </span>
                    </div>
                  </div>
                ) : <Placeholder running={running} />}
              </BridgeCard>

              <BridgeCard
                lang="TypeScript"
                accent="from-blue-50 to-blue-100/40"
                label="slugify(title)"
                snippet={'slug = title.toLowerCase()\n  .replace(/[^a-z0-9]+/g, "-")\n  .replace(/^-|-$/g, "");'}
              >
                {slug ? (
                  <div className="mono text-sm bg-slate-900 text-modra-500 px-3 py-2 rounded-lg inline-block">
                    {slug}
                  </div>
                ) : <Placeholder running={running} />}
              </BridgeCard>

              <BridgeCard
                lang="Bash"
                accent="from-amber-50 to-amber-100/40"
                label="awk /proc/uptime"
                snippet={"uptime=$(awk '{print $1}' /proc/uptime)"}
              >
                {uptime ? (
                  <div className="mono text-sm">
                    uptime = <span className="bg-slate-900 text-modra-500 px-2 py-0.5 rounded">{uptime}</span> seconds
                  </div>
                ) : <Placeholder running={running} />}
              </BridgeCard>
            </div>
          </div>

          <div className="mt-4 text-xs text-slate-400">
            Each <code className="bg-slate-100 px-1.5 py-0.5 rounded">Native&lt;Lang&gt;</code> block becomes a typed action.
            The compiler generates the subprocess wiring; you call it like any other Modra function.
          </div>
        </div>
      );
    }

    function BridgeCard({ lang, accent, label, snippet, children }) {
      return (
        <div className={"rounded-2xl border border-slate-200 shadow-sm p-4 bg-gradient-to-br " + accent}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-2">
              <span className="px-2 py-0.5 rounded-full bg-white text-[10px] font-bold uppercase tracking-wider text-slate-700 border border-slate-200">{lang}</span>
              <span className="text-[11px] font-semibold text-slate-600">{label}</span>
            </div>
          </div>
          <pre className="mono text-[11px] text-slate-700 bg-white/60 border border-slate-200 rounded-lg p-2.5 mb-3 overflow-auto">{snippet}</pre>
          <div>{children}</div>
        </div>
      );
    }

    function Placeholder({ running }) {
      return (
        <div className="text-xs text-slate-400">
          {running ? <span className="italic">awaiting subprocess...</span> : <span>Click <strong>Run all</strong> to invoke the bridge.</span>}
        </div>
      );
    }

    function delay(ms) {
      return new Promise(res => setTimeout(res, ms));
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
