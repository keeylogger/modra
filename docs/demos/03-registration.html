<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registration | Modra demo</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        modra: { 50: '#ecf9ef', 100: '#d3f1d8', 500: '#3FB456', 600: '#2E9D43', 700: '#155E2B' },
        ember: { 100: '#fde2e4', 500: '#E5394A', 600: '#C72436' },
      }}},
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body { background: #f6f7f9; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    .demo-eyebrow { font-feature-settings: "cv11", "ss01"; }
    .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
  </style>
</head>
<body class="min-h-screen p-6 antialiased text-slate-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    // ─── In-memory "DB.Users" table (what Modra would create as Postgres) ───
    const initialUsers = [
      { ID: "u-1a2b", Name: "Ada Lovelace",  Email: "ada@modra.dev",   PasswordHash: "0x7e1a..." },
      { ID: "u-3c4d", Name: "Grace Hopper",  Email: "grace@modra.dev", PasswordHash: "0x9c4f..." },
    ];

    // Modra: Crypto.Hash(password)
    const fakeHash = (s) => {
      let h = 0;
      for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
      return "0x" + (h >>> 0).toString(16).padStart(8, "0") + "...";
    };
    const fakeUUID = () =>
      "u-" + Math.random().toString(16).slice(2, 6) + Math.random().toString(16).slice(2, 6);

    function App() {
      const [users, setUsers] = useState(initialUsers);
      const [name, setName] = useState("");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [status, setStatus] = useState({ kind: "idle", msg: "" });

      // Modra endpoint: Register(name, email, password) -> Insert
      const register = (e) => {
        e?.preventDefault?.();
        if (!name.trim() || !email.trim() || !password.trim()) {
          setStatus({ kind: "error", msg: "All fields are required." });
          return;
        }
        // Mocks the @Unique constraint on Email
        if (users.some(u => u.Email.toLowerCase() === email.trim().toLowerCase())) {
          setStatus({ kind: "error", msg: "That email is already taken. (@Unique violated)" });
          return;
        }
        const u = {
          ID: fakeUUID(),
          Name: name.trim(),
          Email: email.trim(),
          PasswordHash: fakeHash(password),
        };
        setUsers(prev => [u, ...prev]);
        setStatus({ kind: "ok", msg: "Account " + u.ID + " created." });
        setName(""); setEmail(""); setPassword("");
      };

      return (
        <div className="max-w-3xl mx-auto">
          <div className="demo-eyebrow flex items-center gap-2 mb-3 text-[10px] uppercase tracking-[0.18em] font-bold text-modra-700">
            <span className="inline-block w-1.5 h-1.5 rounded-full bg-modra-500 animate-pulse"></span>
            Modra runtime | full-stack register endpoint
          </div>

          <div className="grid md:grid-cols-5 gap-4">
            {/* ── Form (the Component) ── */}
            <div className="md:col-span-3 rounded-2xl bg-white border border-slate-200 shadow-sm p-6">
              <h1 className="text-xl font-bold text-slate-900 mb-1">Create your account</h1>
              <p className="text-sm text-slate-500 mb-5">Your password is hashed by the server before it touches the DB.</p>

              <form onSubmit={register} className="space-y-3">
                <Field label="Full name" value={name} onChange={setName} placeholder="Ada Lovelace" />
                <Field label="Email" type="email" value={email} onChange={setEmail} placeholder="you@example.com" />
                <Field label="Password" type="password" value={password} onChange={setPassword} placeholder="something strong" />

                <button
                  type="submit"
                  className="w-full mt-2 px-5 py-3 rounded-xl bg-modra-500 hover:bg-modra-600 text-white font-semibold text-sm transition-colors"
                >
                  Create account
                </button>

                {status.kind !== "idle" && (
                  <div className={
                    "text-sm px-4 py-3 rounded-xl border " +
                    (status.kind === "ok"
                      ? "bg-modra-50 border-modra-100 text-modra-700"
                      : "bg-ember-100 border-ember-100 text-ember-600")
                  }>
                    {status.msg}
                  </div>
                )}
              </form>
            </div>

            {/* ── Live DB.Users view ── */}
            <div className="md:col-span-2 rounded-2xl bg-slate-900 text-slate-100 border border-slate-800 shadow-sm p-5 overflow-hidden">
              <div className="flex items-center justify-between mb-3">
                <div className="text-[10px] uppercase tracking-[0.18em] font-bold text-modra-500">DB.Users</div>
                <div className="text-[10px] uppercase tracking-[0.18em] font-bold text-slate-500 tabular-nums">{users.length} rows</div>
              </div>
              <ul className="space-y-2 mono text-[11px] max-h-[300px] overflow-auto pr-1">
                {users.map(u => (
                  <li key={u.ID} className="rounded-lg bg-slate-800/80 border border-slate-700 p-2.5">
                    <div className="text-modra-500">{u.ID}</div>
                    <div className="text-slate-200">{u.Name}</div>
                    <div className="text-slate-400">{u.Email}</div>
                    <div className="text-slate-500">hash: {u.PasswordHash}</div>
                  </li>
                ))}
              </ul>
            </div>
          </div>

          <div className="mt-4 text-xs text-slate-400">
            <code className="bg-slate-100 px-1.5 py-0.5 rounded">@Unique</code> on Email is enforced ;
            <code className="ml-1 bg-slate-100 px-1.5 py-0.5 rounded">Crypto.Hash(password)</code> never sends the plaintext to the DB.
          </div>
        </div>
      );
    }

    function Field({ label, type = "text", value, onChange, placeholder }) {
      return (
        <label className="block">
          <span className="block text-xs font-semibold text-slate-600 mb-1">{label}</span>
          <input
            type={type}
            value={value}
            onChange={(e) => onChange(e.target.value)}
            placeholder={placeholder}
            className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-modra-500 focus:ring-2 focus:ring-modra-100 outline-none text-sm"
          />
        </label>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
