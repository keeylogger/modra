<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Todo list | Modra demo</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        modra: { 50: '#ecf9ef', 100: '#d3f1d8', 500: '#3FB456', 600: '#2E9D43', 700: '#155E2B' },
        ember: { 100: '#fde2e4', 500: '#E5394A', 600: '#C72436' },
      }}},
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body { background: #f6f7f9; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    .demo-eyebrow { font-feature-settings: "cv11", "ss01"; }
  </style>
</head>
<body class="min-h-screen p-6 antialiased text-slate-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    function App() {
      // Modra:  Array<String>: Items <- []
      const [items, setItems] = useState([
        "Pitch Modra to the team",
        "Ship the docs site",
        "Make examples runnable",
      ]);
      // Modra:  String: Draft <- ""
      const [draft, setDraft] = useState("");

      // Actions
      const add = () => {
        const v = draft.trim();
        if (!v) return;
        setItems(prev => [...prev, v]);
        setDraft("");
      };
      const clear = () => setItems([]);
      // Items.WithoutAt(i)
      const removeAt = (i) => setItems(prev => prev.filter((_, idx) => idx !== i));

      return (
        <div className="max-w-xl mx-auto">
          <div className="demo-eyebrow flex items-center gap-2 mb-3 text-[10px] uppercase tracking-[0.18em] font-bold text-modra-700">
            <span className="inline-block w-1.5 h-1.5 rounded-full bg-modra-500 animate-pulse"></span>
            Modra runtime | todo board
          </div>

          <div className="rounded-2xl bg-white border border-slate-200 shadow-sm p-6">
            {/* Text: Header <- "You have " + Items.length + " item(s)" */}
            <div className="flex items-center justify-between mb-5">
              <h1 className="text-xl font-bold text-slate-900">
                You have <span className="text-modra-600 tabular-nums">{items.length}</span> item(s)
              </h1>
              <button
                onClick={clear}
                disabled={!items.length}
                className="text-xs px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-ember-100 hover:text-ember-600 text-slate-600 font-semibold disabled:opacity-40 disabled:hover:bg-slate-100 disabled:hover:text-slate-600 transition-colors"
              >
                Clear all
              </button>
            </div>

            {/* form (InputField::Draft, Submit) */}
            <form
              onSubmit={(e) => { e.preventDefault(); add(); }}
              className="flex gap-2 mb-5"
            >
              <input
                value={draft}
                onChange={(e) => setDraft(e.target.value)}
                placeholder="What needs doing?"
                className="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-modra-500 focus:ring-2 focus:ring-modra-100 outline-none text-sm"
              />
              <button
                type="submit"
                className="px-5 py-2.5 rounded-xl bg-modra-500 hover:bg-modra-600 text-white font-semibold text-sm transition-colors"
              >
                Add
              </button>
            </form>

            {/* forEach item in Items -> Text: Row (item) */}
            {items.length === 0 ? (
              <div className="text-center py-8 text-slate-400 text-sm">
                Nothing to do. Enjoy the day.
              </div>
            ) : (
              <ul className="space-y-2">
                {items.map((item, i) => (
                  <li
                    key={i}
                    className="group flex items-center gap-3 px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 hover:border-slate-200 transition-colors"
                  >
                    <span className="text-xs font-bold text-modra-600 tabular-nums w-6">{i + 1}.</span>
                    <span className="flex-1 text-sm text-slate-800">{item}</span>
                    <button
                      onClick={() => removeAt(i)}
                      className="opacity-0 group-hover:opacity-100 text-ember-500 hover:text-ember-600 text-sm font-bold transition-opacity"
                      aria-label="Remove"
                    >
                      &times;
                    </button>
                  </li>
                ))}
              </ul>
            )}

            <div className="mt-5 pt-4 border-t border-slate-100 text-xs text-slate-400">
              <code className="bg-slate-100 px-1.5 py-0.5 rounded">InputField::Draft</code> binds input two-way ;
              <code className="ml-1 bg-slate-100 px-1.5 py-0.5 rounded">forEach</code> renders the list reactively.
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
