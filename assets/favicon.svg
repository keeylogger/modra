<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Modra">
  <!-- Rounded dark-green brand square -->
  <rect width="64" height="64" rx="14" ry="14" fill="#0F4A22"/>

  <!-- Two small flanking hex shards (the brand's panel motif) -->
  <path d="M 11 14 L 6 19 L 6 32 L 11 32 Z"  fill="#45B85C"/>
  <path d="M 11 14 L 11 32 L 16 32 L 16 19 Z" fill="#2E9D43"/>
  <path d="M 11 32 L 6 32 L 6 45 L 11 50 Z"   fill="#155E2B"/>
  <path d="M 11 32 L 11 50 L 16 45 L 16 32 Z" fill="#0F4A22"/>
  <path d="M 53 14 L 53 32 L 58 32 L 58 19 Z" fill="#45B85C"/>
  <path d="M 53 14 L 48 19 L 48 32 L 53 32 Z" fill="#2E9D43"/>
  <path d="M 53 32 L 53 50 L 58 45 L 58 32 Z" fill="#155E2B"/>
  <path d="M 53 32 L 48 32 L 48 45 L 53 50 Z" fill="#0F4A22"/>

  <!-- Faceted red M (trapezoidal facets, scaled to 64 grid)
       A=(22,12)  C=(42,12)  B=(32,22)
       F=(22,46)  D=(42,46)  E=(32,52)
       P1=(27,17) P5=(37,17) P2=(27,49) P6=(37,49)
       P3=(27,32) P7=(37,32) P4=(32,32) L=(22,32) R=(42,32)
  -->
  <path d="M 22 12 L 27 17 L 27 32 L 22 32 Z" fill="#C42028"/>
  <path d="M 22 32 L 27 32 L 27 49 L 22 46 Z" fill="#A11A21"/>
  <path d="M 27 17 L 32 22 L 32 32 L 27 32 Z" fill="#8C151C"/>
  <path d="M 27 32 L 32 32 L 32 52 L 27 49 Z" fill="#6A121A"/>
  <path d="M 42 12 L 37 17 L 37 32 L 42 32 Z" fill="#C42028"/>
  <path d="M 42 32 L 37 32 L 37 49 L 42 46 Z" fill="#A11A21"/>
  <path d="M 37 17 L 32 22 L 32 32 L 37 32 Z" fill="#8C151C"/>
  <path d="M 37 32 L 32 32 L 32 52 L 37 49 Z" fill="#6A121A"/>
  <!-- Peak highlights -->
  <path d="M 22 12 L 22 16 L 25 14 Z" fill="#E63946"/>
  <path d="M 42 12 L 39 14 L 42 16 Z" fill="#E63946"/>
</svg>
