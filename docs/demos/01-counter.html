<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Counter | Modra demo</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            modra: { 50: '#ecf9ef', 100: '#d3f1d8', 500: '#3FB456', 600: '#2E9D43', 700: '#155E2B' },
            ember: { 100: '#fde2e4', 500: '#E5394A', 600: '#C72436' },
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body { background: #f6f7f9; }
    .demo-eyebrow { font-feature-settings: "cv11", "ss01"; }
  </style>
</head>
<body class="min-h-screen font-sans p-6 antialiased text-slate-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    function App() {
      // Modra:  Number: Count <- 0
      const [count, setCount] = useState(0);

      // Modra Actions
      const increment = () => setCount(c => c + 1);
      const decrement = () => setCount(c => c - 1);
      const reset     = () => setCount(0);

      return (
        <div className="max-w-md mx-auto">
          <div className="demo-eyebrow flex items-center gap-2 mb-3 text-[10px] uppercase tracking-[0.18em] font-bold text-modra-700">
            <span className="inline-block w-1.5 h-1.5 rounded-full bg-modra-500 animate-pulse"></span>
            Modra runtime | counter
          </div>

          <div className="rounded-2xl bg-white border border-slate-200 shadow-sm p-8">
            {/* Text: Display <- "Count is " + Count */}
            <div className="text-sm text-slate-500 mb-2">Count is</div>
            <div className="text-7xl font-extrabold tabular-nums text-slate-900 mb-8 tracking-tight">
              {count}
            </div>

            {/* form (Submit ..., Submit ..., Submit ...) */}
            <div className="grid grid-cols-3 gap-2">
              <button
                onClick={decrement}
                className="px-4 py-3 rounded-xl bg-ember-100 hover:bg-ember-500 hover:text-white text-ember-600 font-bold text-lg transition-colors"
              >
                &minus;
              </button>
              <button
                onClick={reset}
                className="px-4 py-3 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold transition-colors"
              >
                Reset
              </button>
              <button
                onClick={increment}
                className="px-4 py-3 rounded-xl bg-modra-100 hover:bg-modra-500 hover:text-white text-modra-700 font-bold text-lg transition-colors"
              >
                +
              </button>
            </div>

            <div className="mt-6 pt-4 border-t border-slate-100 text-xs text-slate-400 flex justify-between">
              <span>Reactive state via <code className="bg-slate-100 px-1.5 py-0.5 rounded">{'<-'}</code></span>
              <span>Actions wired to <code className="bg-slate-100 px-1.5 py-0.5 rounded">Click {'->'}</code></span>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
